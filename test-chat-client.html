<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat Test</title>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .chat-container {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .messages {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #eee;
            padding: 10px;
            margin-bottom: 10px;
            background: #f9f9f9;
        }
        .message {
            padding: 8px;
            margin: 5px 0;
            border-radius: 4px;
            background: white;
        }
        .message.sent {
            background: #dcf8c6;
            text-align: right;
        }
        .message.received {
            background: white;
        }
        .typing-indicator {
            color: #666;
            font-style: italic;
            font-size: 12px;
        }
        input, button {
            padding: 10px;
            margin: 5px;
        }
        input[type="text"] {
            width: 70%;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .status.connected {
            background: #d4edda;
            color: #155724;
        }
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }
        .config {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Real-Time Chat Test Client</h1>
    
    <div class="config">
        <h3>Configuration</h3>
        <label>Backend URL: <input type="text" id="backendUrl" value="http://localhost:3000" style="width: 300px;"></label><br>
        <label>JWT Token: <input type="text" id="jwtToken" placeholder="Your JWT token" style="width: 300px;"></label><br>
        <label>Chat ID: <input type="text" id="chatId" placeholder="Chat ID"></label><br>
        <label>User ID: <input type="text" id="userId" placeholder="Your User ID"></label><br>
        <button onclick="connect()">Connect</button>
        <button onclick="disconnect()">Disconnect</button>
    </div>

    <div id="status" class="status disconnected">Disconnected</div>

    <div class="chat-container">
        <h3>Messages</h3>
        <div id="messages" class="messages"></div>
        <div id="typingIndicator" class="typing-indicator"></div>
        <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>

    <div class="chat-container">
        <h3>Event Log</h3>
        <div id="eventLog" class="messages"></div>
    </div>

    <script>
        let mainSocket = null;
        let chatSocket = null;
        let typingTimeout = null;

        function log(message, type = 'info') {
            const eventLog = document.getElementById('eventLog');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = 'message';
            logEntry.innerHTML = `<strong>[${timestamp}]</strong> ${message}`;
            eventLog.appendChild(logEntry);
            eventLog.scrollTop = eventLog.scrollHeight;
            console.log(`[${type}]`, message);
        }

        function updateStatus(connected) {
            const status = document.getElementById('status');
            status.className = connected ? 'status connected' : 'status disconnected';
            status.textContent = connected ? 'Connected' : 'Disconnected';
        }

        function connect() {
            const backendUrl = document.getElementById('backendUrl').value;
            const token = document.getElementById('jwtToken').value;

            if (!token) {
                alert('Please enter a JWT token');
                return;
            }

            // Connect to main gateway
            mainSocket = io(backendUrl, {
                query: { token }
            });

            // Connect to chat namespace
            chatSocket = io(`${backendUrl}/chat`, {
                query: { token }
            });

            // Main socket events
            mainSocket.on('connect', () => {
                log('Connected to main gateway', 'success');
                updateStatus(true);
            });

            mainSocket.on('disconnect', () => {
                log('Disconnected from main gateway', 'warning');
                updateStatus(false);
            });

            mainSocket.on('newMessage', (message) => {
                log('Received new message via WebSocket', 'info');
                displayMessage(message, 'received');
            });

            mainSocket.on('userTyping', (data) => {
                const indicator = document.getElementById('typingIndicator');
                indicator.textContent = data.isTyping ? 'User is typing...' : '';
            });

            mainSocket.on('messageRead', (data) => {
                log(`Message ${data.messageId} was read`, 'info');
            });

            // Chat socket events
            chatSocket.on('connect', () => {
                log('Connected to chat namespace', 'success');
            });

            chatSocket.on('messageSent', (message) => {
                log('Message sent confirmation received', 'success');
                displayMessage(message, 'sent');
            });

            chatSocket.on('error', (error) => {
                log(`Error: ${error.message}`, 'error');
                alert(`Error: ${error.message}`);
            });
        }

        function disconnect() {
            if (mainSocket) mainSocket.disconnect();
            if (chatSocket) chatSocket.disconnect();
            log('Disconnected', 'warning');
            updateStatus(false);
        }

        function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();
            const chatId = document.getElementById('chatId').value;
            const userId = document.getElementById('userId').value;

            if (!message) {
                alert('Please enter a message');
                return;
            }

            if (!chatId || !userId) {
                alert('Please enter Chat ID and User ID');
                return;
            }

            if (!chatSocket || !chatSocket.connected) {
                alert('Not connected to chat server');
                return;
            }

            chatSocket.emit('sendMessage', {
                chatId,
                senderId: userId,
                message
            });

            log(`Sending message: "${message}"`, 'info');
            messageInput.value = '';
            stopTyping();
        }

        function displayMessage(message, type) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const time = new Date(message.createdAt).toLocaleTimeString();
            messageDiv.innerHTML = `
                <div><strong>${type === 'sent' ? 'You' : 'Other User'}</strong> - ${time}</div>
                <div>${message.message}</div>
                ${message.isRead ? '<div style="font-size: 10px;">✓✓ Read</div>' : ''}
            `;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            } else {
                startTyping();
            }
        }

        function startTyping() {
            const chatId = document.getElementById('chatId').value;
            const userId = document.getElementById('userId').value;

            if (chatSocket && chatSocket.connected && chatId && userId) {
                chatSocket.emit('typing', {
                    chatId,
                    senderId: userId,
                    isTyping: true
                });

                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(stopTyping, 3000);
            }
        }

        function stopTyping() {
            const chatId = document.getElementById('chatId').value;
            const userId = document.getElementById('userId').value;

            if (chatSocket && chatSocket.connected && chatId && userId) {
                chatSocket.emit('typing', {
                    chatId,
                    senderId: userId,
                    isTyping: false
                });
            }
        }

        // Auto-connect if token is provided
        window.addEventListener('load', () => {
            log('Chat test client loaded. Configure and click Connect.', 'info');
        });
    </script>
</body>
</html>
